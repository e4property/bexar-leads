name: Scrape & Enrich Leads
on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM CST
    - cron: '0 17 * * *'   # 12:00 PM CST
    - cron: '0 21 * * *'   # 4:00 PM CST
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests selenium

      - name: Create output directories
        run: mkdir -p data dashboard

      - name: Run scraper
        env:
          GHL_API_KEY:     ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
        run: python scraper/fetch.py

      - name: Show summary
        run: |
          python3 -c "
          import json
          with open('data/records.json') as f:
              r = json.load(f)
          named = sum(1 for x in r if x.get('owner'))
          print(f'Total:  {len(r)}')
          print(f'NOF:    {sum(1 for x in r if x[\"type\"]==\"NOF\")}')
          print(f'TAX:    {sum(1 for x in r if x[\"type\"]==\"TAX\")}')
          print(f'Named:  {named}')
          "

      - name: Verify dashboard
        run: |
          ls -lh dashboard/
          wc -c dashboard/index.html

      - name: Commit records to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/records.json dashboard/records.json dashboard/index.html
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy dashboard to gh-pages branch
        run: |
          # Save the built files
          cp dashboard/index.html /tmp/index.html
          cp dashboard/records.json /tmp/records.json

          echo "File sizes to deploy:"
          wc -c /tmp/index.html
          wc -c /tmp/records.json

          # Switch to gh-pages branch (create if needed)
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Clear everything and put fresh files
          git rm -rf . 2>/dev/null || true
          cp /tmp/index.html index.html
          cp /tmp/records.json records.json

          echo "Files in gh-pages branch:"
          ls -lh
          wc -c index.html

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html records.json
          git commit -m "deploy: update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages --force

