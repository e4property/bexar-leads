name: Scrape & Enrich Leads
on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM CST
    - cron: '0 17 * * *'   # 12:00 PM CST
    - cron: '0 21 * * *'   # 4:00 PM CST
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests selenium

      - name: Create output directories
        run: mkdir -p data dashboard

      - name: Run scraper
        env:
          GHL_API_KEY:     ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
        run: python scraper/fetch.py

      - name: Show summary
        run: |
          python3 -c "
          import json
          with open('data/records.json') as f:
              r = json.load(f)
          named = sum(1 for x in r if x.get('owner'))
          print(f'Total:  {len(r)}')
          print(f'NOF:    {sum(1 for x in r if x[\"type\"]==\"NOF\")}')
          print(f'TAX:    {sum(1 for x in r if x[\"type\"]==\"TAX\")}')
          print(f'Named:  {named}')
          "

      - name: Verify dashboard
        run: |
          ls -lh dashboard/
          wc -c dashboard/index.html

      - name: Commit records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/records.json dashboard/records.json dashboard/index.html
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

