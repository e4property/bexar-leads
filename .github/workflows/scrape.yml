name: Scrape Bexar County Leads

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape & Enrich Leads
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Create output directories
        run: mkdir -p dashboard data

      - name: Verify secrets
        env:
          CLERK_AUTH_TOKEN: ${{ secrets.CLERK_AUTH_TOKEN }}
          CLERK_AUTH_SIG:   ${{ secrets.CLERK_AUTH_SIG }}
        run: |
          python -c "
          import os
          t = os.getenv('CLERK_AUTH_TOKEN','')
          s = os.getenv('CLERK_AUTH_SIG','')
          print(f'CLERK_AUTH_TOKEN set: {bool(t)} (len={len(t)})')
          print(f'CLERK_AUTH_SIG set:   {bool(s)} (len={len(s)})')
          if not t:
              print('ERROR: CLERK_AUTH_TOKEN missing - go to Settings > Secrets > Actions')
          "

      - name: Run scraper
        env:
          LOOKBACK_DAYS:    "7"
          CLERK_AUTH_TOKEN: ${{ secrets.CLERK_AUTH_TOKEN }}
          CLERK_AUTH_SIG:   ${{ secrets.CLERK_AUTH_SIG }}
        run: python scraper/fetch.py
        timeout-minutes: 15

      - name: Show output summary
        run: |
          python -c "
          import json
          with open('dashboard/records.json') as f:
              d = json.load(f)
          print(f'Total records : {d[\"total\"]}')
          print(f'With address  : {d[\"with_address\"]}')
          print(f'Fetched at    : {d[\"fetched_at\"]}')
          "

      - name: Commit updated records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/leads_export.csv CLAUDE.md || true
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy:
    name: Deploy to GitHub Pages
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

