name: Scrape & Enrich Leads

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 3 AM UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests --break-system-packages 2>/dev/null || pip install requests

      - name: Create output directories
        run: |
          mkdir -p data dashboard

      - name: Run scraper
        run: python scraper/fetch.py

      - name: Show summary
        run: |
          echo "=== Records ===" 
          python3 -c "
          import json
          with open('data/records.json') as f:
              r = json.load(f)
          print(f'Total: {len(r)}')
          print(f'NOF:   {sum(1 for x in r if x[\"type\"]==\"NOF\")}')
          print(f'TAX:   {sum(1 for x in r if x[\"type\"]==\"TAX\")}')
          print(f'Addr:  {sum(1 for x in r if x.get(\"address\"))}')
          if r:
              print(f'Sample: {r[0]}')
          "

      - name: Commit records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/records.json dashboard/records.json dashboard/index.html
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: scrape-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

